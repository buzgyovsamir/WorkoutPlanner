{% extends "base.html" %}

{% block title %}Delete Workout{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Delete Workout</h1>
                <p>Are you sure you want to delete <strong>{{ workout.title }}</strong>?</p>
                <p class="text-muted">This removes the workout but keeps the exercises in the library.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger" type="submit">Yes, delete</button>
                        <a class="btn btn-outline-secondary" href="{% url 'workouts:detail' workout.pk %}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
